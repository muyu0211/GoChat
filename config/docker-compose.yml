version: '3.8'

services:
  ginchat_mysql_master:
    image: mysql:8.0
    container_name: ginchat_mysql_master
    restart: always
    ports:
      - "3307:3306"
    volumes:
      - /home/mysql/node-0/config:/etc/mysql/conf.d
      - /home/mysql/node-0/data:/var/lib/mysql
    environment:
      - MYSQL_ROOT_PASSWORD=021103
    networks:
      - ginchat-network

  # Redis 服务
  redis01:
    image: bitnami/redis
    container_name: redis01
    restart: always
    ports:
      - "6380:6379"
    volumes:
      - /home/redis/node-0:/bitnami/redis/data
    environment:
      - REDIS_REPLICATION_MODE=master
      - REDIS_PASSWORD=021103
    networks:
      - ginchat-network

# 定义网络
networks:
  ginchat-network:
    name: GinChat
    driver: bridge