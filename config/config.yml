app:
  name: "CloudStorage"
  mode: "prod" # dev, test, prod
  port: :9001

mysql:
  master:
    #    host: "172.21.96.1"
    host: "192.168.44.129"
    port: "3306"
    user: "root"
    password: "021103"
    dbname: "ginchat"
  slave:
    host: "192.168.44.129"
    port: "3308"
    user: "root"
    password: "021103"
    dbname: "whiteboard"
    # 连接池配置
  max_open_conns: 100    # 最大打开的连接数
  max_idle_conns: 10     # 最大空闲连接数
  conn_max_lifetime: 3600 # 连接可复用的最大时间 (秒)

redis:
  host: "192.168.44.129"
  port: "6380"
  password: "021103"
  db: 0
  pool_size: 100 # 连接池大小
  
kafka:
  brokers: ["192.168.44.129:9094"]      # Kafka broker地址（多个用数组）

# 鉴权配置
jwt:
  secret: "a-very-secret-and-long-key-that-should-be-random"
  expire_hours: 24
  issuer: "my-white-board"

# 跨域配置
cors:
  mode: "allow-all" # or "whitelist"
  whitelist:
    - "http://localhost:5173" # 前端开发服务器地址
#    - "http://your-production-domain.com" # 生产环境前端域名

# 限流配置
rate_limit:
  # 全局IP限流策略
  global_ip:
    rate: 20        # 每秒允许的请求数
    burst: 50       # 令牌桶容量
    unit: "second" # 时间单位 (second, minute, hour)

  # 核心API用户限流策略
  core_user:
    rate: 100
    burst: 120
    unit: "minute"

# 日志配置
logger:
  level: "debug"            # 日志级别
  filename: "./logs/app.log" # 日志文件路径
  max_size: 200             # 日志文件大小上限 (MB)
  max_age: 30               # 日志文件保留天数
  max_backups: 7            # 最多保留的备份文件数
  compress: true            # 是否压缩备份文件